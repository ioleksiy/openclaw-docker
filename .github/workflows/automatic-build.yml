name: Build Custom OpenClaw

on:
  schedule:
    - cron: '0 6 * * *' 
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/openclaw-docker-auto

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Get latest stable release
        id: release
        run: |
          TAG=$(curl -s https://api.github.com/repos/openclaw/openclaw/releases \
            | jq -r '[.[] | select(.prerelease == false) | select(.tag_name | test("beta"; "i") | not)] | first | .tag_name')
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Latest stable: $TAG"

      - name: Check if image already exists
        id: check
        run: |
          TOKEN=$(echo "${{ secrets.GITHUB_TOKEN }}" | base64)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://ghcr.io/v2/${{ env.IMAGE_NAME }}/manifests/${{ steps.release.outputs.tag }}")
          if [ "$STATUS" = "200" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Image already exists, skipping build"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Image not found, will build"
          fi

      - name: Checkout OpenClaw source
        if: steps.check.outputs.exists == 'false'
        uses: actions/checkout@v4
        with:
          repository: openclaw/openclaw
          ref: ${{ steps.release.outputs.tag }}

      - name: Log in to GHCR
        if: steps.check.outputs.exists == 'false'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: steps.check.outputs.exists == 'false'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.release.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            OPENCLAW_INSTALL_BROWSER=1
            OPENCLAW_DOCKER_APT_PACKAGES=socat
          cache-from: type=gha
          cache-to: type=gha,mode=max
